<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Probability & tree diagrams — VisualMaths</title><style>
@import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');

:root {
  --brand: #4338ca;
  --brand-light: #e8e6fc;
  --brand-dark: #312e81;
  --teal: #0f766e;
  --teal-light: #d5f5f0;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --coral: #c2410c;
  --coral-light: #fff1e6;
  --pink: #be185d;
  --pink-light: #fce7f3;
  --green: #15803d;
  --green-light: #dcfce7;
  --surface: #fafaf9;
  --card: #ffffff;
  --text: #1c1917;
  --text-secondary: #78716c;
  --text-tertiary: #a8a29e;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --brand: #818cf8;
    --brand-light: #1e1b4b;
    --brand-dark: #c7d2fe;
    --teal: #5eead4;
    --teal-light: #042f2e;
    --amber: #fbbf24;
    --amber-light: #422006;
    --coral: #fb923c;
    --coral-light: #431407;
    --pink: #f472b6;
    --pink-light: #500724;
    --green: #4ade80;
    --green-light: #052e16;
    --surface: #0c0a09;
    --card: #1c1917;
    --text: #fafaf9;
    --text-secondary: #a8a29e;
    --text-tertiary: #78716c;
    --border: #292524;
    --border-strong: #44403c;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.site-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-home {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  font-weight: 600;
  font-size: 15px;
}
.nav-home svg { width: 20px; height: 20px; }
.nav-sep { color: var(--text-tertiary); font-size: 14px; }
.nav-title { font-size: 15px; color: var(--text-secondary); font-weight: 500; }

/* TOOL PAGE LAYOUT */
.tool-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.tool-header {
  margin-bottom: 24px;
}
.tool-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.tool-header p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.tool-body {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

/* COMMON WIDGET STYLES */
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 6px; }
.num-input {
  width: 56px; font-size: 17px; font-weight: 600; text-align: center; padding: 6px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text);
}
.num-input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
.sym { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
select {
  font-size: 14px; padding: 6px 10px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text);
}
button {
  font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text); cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--surface); }
button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
button.primary:hover { opacity: 0.9; }

.step-card {
  background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; margin: 8px 0;
}
.step-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.step-math { font-size: 16px; font-weight: 600; }
.result-box {
  text-align: center; font-size: 20px; font-weight: 700; padding: 14px;
  background: var(--surface); border-radius: var(--radius-sm); margin: 12px 0;
}
.result-box.ok { color: var(--green); background: var(--green-light); }
.hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.bar-outer {
  height: 38px; border-radius: 6px; overflow: hidden; display: flex;
  border: 1px solid var(--border-strong);
}
.bar-seg { height: 100%; border-right: 1px solid rgba(0,0,0,0.08); }
.bar-seg:last-child { border-right: none; }

.mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-btn { font-size: 13px; padding: 6px 14px; }
.mode-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }

/* WEIGHT BLOCKS (seesaw) */
.wb {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 32px; padding: 0 8px; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: grab; touch-action: none;
}
.wb:active { cursor: grabbing; }
.w1 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
.w2 { background: var(--brand-light); color: var(--brand-dark); border: 1px solid #a5b4fc; }
.w5 { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
.w10 { background: var(--coral-light); color: var(--coral); border: 1px solid #fdba74; }
.wx { background: var(--pink-light); color: var(--pink); border: 1px solid #f9a8d4; font-style: italic; }
.wn { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

/* GRID TABLE */
.g-table { border-collapse: collapse; }
.g-table td, .g-table th { padding: 10px 16px; text-align: center; font-size: 15px; }
.g-table th { font-weight: 600; color: var(--text-secondary); }

/* CANVAS / SVG */
canvas, svg { display: block; }

/* HOMEPAGE */
.home-hero {
  text-align: center;
  padding: 48px 20px 36px;
}
.home-hero h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.home-hero p {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.topic-card:hover {
  border-color: var(--brand);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.card-tag {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; background: var(--surface); color: var(--text-tertiary);
  align-self: flex-start; margin-top: auto;
}

.section-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-tertiary); padding: 0 20px; max-width: 960px; margin: 24px auto 8px;
}

</style></head><body><nav class="site-nav"><a href="index.html" class="nav-home"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10l7-7 7 7M5 8.5V16h4v-4h2v4h4V8.5"/></svg> VisualMaths</a><span class="nav-sep">/</span><span class="nav-title">Probability & tree diagrams</span></nav><div class="tool-page"><div class="tool-header"><h1>Probability & tree diagrams</h1><p>Build tree diagrams for two events, see combined probabilities, and run simulations to watch experimental probability converge.</p></div><div class="tool-body"><div class="row" style="margin-bottom:6px"><span style="font-size:14px;font-weight:600">Event 1:</span></div>
<div class="row" style="margin-bottom:10px;gap:6px">
<span style="font-size:13px;color:var(--text-secondary)">P(A) =</span><input class="num-input" id="pA" type="number" value="0.6" min="0" max="1" step="0.05" style="width:60px" oninput="upd()">
<span style="font-size:13px;color:var(--text-secondary);margin-left:8px">Labels:</span>
<input id="lA" value="Win" style="width:60px;font-size:13px;padding:4px;border:1px solid var(--border-strong);border-radius:6px;background:var(--card);color:var(--text)" oninput="upd()">
<input id="lAn" value="Lose" style="width:60px;font-size:13px;padding:4px;border:1px solid var(--border-strong);border-radius:6px;background:var(--card);color:var(--text)" oninput="upd()">
</div>
<div class="row" style="margin-bottom:6px"><span style="font-size:14px;font-weight:600">Event 2:</span></div>
<div class="row" style="margin-bottom:12px;gap:6px">
<span style="font-size:13px;color:var(--text-secondary)">P(B) =</span><input class="num-input" id="pB" type="number" value="0.5" min="0" max="1" step="0.05" style="width:60px" oninput="upd()">
<span style="font-size:13px;color:var(--text-secondary);margin-left:8px">Labels:</span>
<input id="lB" value="Heads" style="width:60px;font-size:13px;padding:4px;border:1px solid var(--border-strong);border-radius:6px;background:var(--card);color:var(--text)" oninput="upd()">
<input id="lBn" value="Tails" style="width:60px;font-size:13px;padding:4px;border:1px solid var(--border-strong);border-radius:6px;background:var(--card);color:var(--text)" oninput="upd()">
</div>
<canvas id="cv" width="600" height="300" style="width:100%;margin-bottom:10px"></canvas>
<div id="combos"></div>
<div style="margin-top:14px;padding:12px;background:var(--surface);border-radius:var(--radius-sm)">
  <div style="font-size:14px;font-weight:600;margin-bottom:8px">Simulation</div>
  <div class="row" style="gap:6px;margin-bottom:8px"><button onclick="sim(10)">Run 10</button><button onclick="sim(100)">Run 100</button><button onclick="sim(1000)">Run 1000</button><button onclick="simReset()">Reset</button></div>
  <div id="simRes" style="font-size:13px;color:var(--text-secondary)"></div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
const COL=dark?'#818cf8':'#4338ca',COL2=dark?'#5eead4':'#0f766e',TXT=dark?'#fafaf9':'#1c1917',TXTM=dark?'#a8a29e':'#78716c',BG=dark?'#1c1917':'#fff';
let simCounts={};
function rn(v){return Math.round(v*1000)/1000}
function upd(){
  const pA=parseFloat(document.getElementById('pA').value)||0,pB=parseFloat(document.getElementById('pB').value)||0;
  const lA=document.getElementById('lA').value||'A',lAn=document.getElementById('lAn').value||'A\'';
  const lB=document.getElementById('lB').value||'B',lBn=document.getElementById('lBn').value||'B\'';
  const pAn=rn(1-pA),pBn=rn(1-pB);
  const W=600,H=300;ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  const sx=60,mx=250,ex=480,y1=70,y2=170,y3=50,y4=120,y5=190,y6=260;
  ctx.strokeStyle=TXTM;ctx.lineWidth=1.5;
  function branch(x1,y1a,x2,y2a,prob,label,col){ctx.beginPath();ctx.moveTo(x1,y1a);ctx.lineTo(x2,y2a);ctx.strokeStyle=col;ctx.stroke();
    const mx2=(x1+x2)/2,my=(y1a+y2a)/2;ctx.fillStyle=col;ctx.font='12px var(--font)';ctx.textAlign='center';ctx.fillText(label+' ('+prob+')',mx2,my-8)}
  branch(sx,H/2,mx,y1,pA,lA,COL);branch(sx,H/2,mx,y2,pAn,lAn,TXTM);
  branch(mx,y1,ex,y3,pB,lB,COL2);branch(mx,y1,ex,y4,pBn,lBn,TXTM);
  branch(mx,y2,ex,y5,pB,lB,COL2);branch(mx,y2,ex,y6,pBn,lBn,TXTM);
  ctx.fillStyle=TXT;ctx.font='bold 12px var(--font)';ctx.textAlign='left';
  const outcomes=[{l:lA+', '+lB,p:rn(pA*pB),y:y3},{l:lA+', '+lBn,p:rn(pA*pBn),y:y4},{l:lAn+', '+lB,p:rn(pAn*pB),y:y5},{l:lAn+', '+lBn,p:rn(pAn*pBn),y:y6}];
  outcomes.forEach(o=>{ctx.fillText(o.l+' = '+o.p,ex+10,o.y+4)});
  ctx.beginPath();ctx.arc(sx,H/2,4,0,Math.PI*2);ctx.fillStyle=COL;ctx.fill();
  let ch='<div style="font-size:14px;font-weight:600;margin-bottom:6px">Combined probabilities</div>';
  outcomes.forEach(o=>{ch+='<div style="display:flex;align-items:center;gap:8px;margin:3px 0;font-size:13px"><div style="flex:1">P('+o.l+')</div><div style="width:60px;text-align:right;font-weight:600">'+o.p+'</div><div class="bar-outer" style="height:16px;flex:2;border-radius:3px"><div class="bar-seg" style="width:'+(o.p*100)+'%;background:'+COL+'"></div></div></div>'});
  ch+='<div style="font-size:12px;color:var(--text-secondary);margin-top:6px">Total = '+rn(outcomes.reduce((s,o)=>s+o.p,0))+'</div>';
  document.getElementById('combos').innerHTML=ch;
}
function sim(n){
  const pA=parseFloat(document.getElementById('pA').value)||0,pB=parseFloat(document.getElementById('pB').value)||0;
  const lA=document.getElementById('lA').value||'A',lAn=document.getElementById('lAn').value||"A'";
  const lB=document.getElementById('lB').value||'B',lBn=document.getElementById('lBn').value||"B'";
  for(let i=0;i<n;i++){const a=Math.random()<pA,b=Math.random()<pB;const k=(a?lA:lAn)+', '+(b?lB:lBn);simCounts[k]=(simCounts[k]||0)+1}
  const total=Object.values(simCounts).reduce((s,v)=>s+v,0);
  let h='<div style="font-size:13px;font-weight:600;margin-bottom:4px">After '+total+' trials:</div>';
  Object.keys(simCounts).sort().forEach(k=>{const f=simCounts[k]/total;h+='<div style="font-size:12px;margin:2px 0">'+k+': '+simCounts[k]+' ('+rn(f)+')</div>'});
  document.getElementById('simRes').innerHTML=h;
}
function simReset(){simCounts={};document.getElementById('simRes').innerHTML=''}
upd();
</script></div></div></body></html>
