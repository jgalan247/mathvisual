<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Circle theorems — VisualMaths</title><style>
@import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');

:root {
  --brand: #4338ca;
  --brand-light: #e8e6fc;
  --brand-dark: #312e81;
  --teal: #0f766e;
  --teal-light: #d5f5f0;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --coral: #c2410c;
  --coral-light: #fff1e6;
  --pink: #be185d;
  --pink-light: #fce7f3;
  --green: #15803d;
  --green-light: #dcfce7;
  --surface: #fafaf9;
  --card: #ffffff;
  --text: #1c1917;
  --text-secondary: #78716c;
  --text-tertiary: #a8a29e;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --brand: #818cf8;
    --brand-light: #1e1b4b;
    --brand-dark: #c7d2fe;
    --teal: #5eead4;
    --teal-light: #042f2e;
    --amber: #fbbf24;
    --amber-light: #422006;
    --coral: #fb923c;
    --coral-light: #431407;
    --pink: #f472b6;
    --pink-light: #500724;
    --green: #4ade80;
    --green-light: #052e16;
    --surface: #0c0a09;
    --card: #1c1917;
    --text: #fafaf9;
    --text-secondary: #a8a29e;
    --text-tertiary: #78716c;
    --border: #292524;
    --border-strong: #44403c;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.site-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-home {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  font-weight: 600;
  font-size: 15px;
}
.nav-home svg { width: 20px; height: 20px; }
.nav-sep { color: var(--text-tertiary); font-size: 14px; }
.nav-title { font-size: 15px; color: var(--text-secondary); font-weight: 500; }

/* TOOL PAGE LAYOUT */
.tool-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.tool-header {
  margin-bottom: 24px;
}
.tool-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.tool-header p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.tool-body {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

/* COMMON WIDGET STYLES */
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 6px; }
.num-input {
  width: 56px; font-size: 17px; font-weight: 600; text-align: center; padding: 6px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text);
}
.num-input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
.sym { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
select {
  font-size: 14px; padding: 6px 10px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text);
}
button {
  font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text); cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--surface); }
button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
button.primary:hover { opacity: 0.9; }

.step-card {
  background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; margin: 8px 0;
}
.step-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.step-math { font-size: 16px; font-weight: 600; }
.result-box {
  text-align: center; font-size: 20px; font-weight: 700; padding: 14px;
  background: var(--surface); border-radius: var(--radius-sm); margin: 12px 0;
}
.result-box.ok { color: var(--green); background: var(--green-light); }
.hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.bar-outer {
  height: 38px; border-radius: 6px; overflow: hidden; display: flex;
  border: 1px solid var(--border-strong);
}
.bar-seg { height: 100%; border-right: 1px solid rgba(0,0,0,0.08); }
.bar-seg:last-child { border-right: none; }

.mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-btn { font-size: 13px; padding: 6px 14px; }
.mode-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }

/* WEIGHT BLOCKS (seesaw) */
.wb {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 32px; padding: 0 8px; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: grab; touch-action: none;
}
.wb:active { cursor: grabbing; }
.w1 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
.w2 { background: var(--brand-light); color: var(--brand-dark); border: 1px solid #a5b4fc; }
.w5 { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
.w10 { background: var(--coral-light); color: var(--coral); border: 1px solid #fdba74; }
.wx { background: var(--pink-light); color: var(--pink); border: 1px solid #f9a8d4; font-style: italic; }
.wn { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

/* GRID TABLE */
.g-table { border-collapse: collapse; }
.g-table td, .g-table th { padding: 10px 16px; text-align: center; font-size: 15px; }
.g-table th { font-weight: 600; color: var(--text-secondary); }

/* CANVAS / SVG */
canvas, svg { display: block; }

/* HOMEPAGE */
.home-hero {
  text-align: center;
  padding: 48px 20px 36px;
}
.home-hero h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.home-hero p {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.topic-card:hover {
  border-color: var(--brand);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.card-tag {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; background: var(--surface); color: var(--text-tertiary);
  align-self: flex-start; margin-top: auto;
}

.section-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-tertiary); padding: 0 20px; max-width: 960px; margin: 24px auto 8px;
}

</style></head><body><nav class="site-nav"><a href="index.html" class="nav-home"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10l7-7 7 7M5 8.5V16h4v-4h2v4h4V8.5"/></svg> VisualMaths</a><span class="nav-sep">/</span><span class="nav-title">Circle theorems</span></nav><div class="tool-page"><div class="tool-header"><h1>Circle theorems</h1><p>Drag points around a circle to explore the key GCSE circle theorems. Watch the angles update live as you move points.</p></div><div class="tool-body"><div class="mode-row" style="flex-wrap:wrap">
<button class="mode-btn active" data-m="0" onclick="setT(0)">Angle at centre</button>
<button class="mode-btn" data-m="1" onclick="setT(1)">Semicircle</button>
<button class="mode-btn" data-m="2" onclick="setT(2)">Same segment</button>
<button class="mode-btn" data-m="3" onclick="setT(3)">Cyclic quad</button>
<button class="mode-btn" data-m="4" onclick="setT(4)">Tangent</button>
</div>
<canvas id="cv" width="500" height="420" style="width:100%;cursor:grab;touch-action:none"></canvas>
<div id="info" class="step-card" style="margin-top:8px"></div>
<div id="rule" class="result-box"></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
const CX=250,CY=210,R=150;
const COL=dark?'#818cf8':'#4338ca',COL2=dark?'#5eead4':'#0f766e',COL3=dark?'#fb923c':'#c2410c',CIRC=dark?'#44403c':'#d6d3d1',TXT=dark?'#fafaf9':'#1c1917',BG=dark?'#1c1917':'#fff';
let theorem=0,pts=[],drag=-1;
const NAMES=['Angle at centre is twice angle at circumference','Angle in a semicircle is 90°','Angles in the same segment are equal','Opposite angles of a cyclic quadrilateral sum to 180°','Tangent meets radius at 90°'];
function ang(cx,cy,px,py){return Math.atan2(py-cy,px-cx)}
function onC(a){return[CX+R*Math.cos(a),CY+R*Math.sin(a)]}
function rn(v){return Math.round(v*10)/10}
function initPts(){
  if(theorem===0)pts=[{a:-2.5},{a:-0.5},{a:1.2}];
  else if(theorem===1)pts=[{a:Math.PI},{a:0},{a:-1.2}];
  else if(theorem===2)pts=[{a:-2.8},{a:-0.3},{a:0.8},{a:1.8}];
  else if(theorem===3)pts=[{a:-2.2},{a:-0.5},{a:0.8},{a:2.2}];
  else pts=[{a:-Math.PI/2}];
}
function setT(t){theorem=t;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',+b.dataset.m===t));initPts();draw()}
function drawArc(x,y,r,a1,a2,col){ctx.beginPath();ctx.arc(x,y,r,a1,a2);ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke()}
function drawPt(x,y,col,label){ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.fillStyle=TXT;ctx.font='13px var(--font)';ctx.fillText(label,x+10,y-10)}
function line(x1,y1,x2,y2,col,w){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=w||1.5;ctx.stroke()}
function angle3(ax,ay,bx,by,cx,cy){const a1=Math.atan2(ay-by,ax-bx),a2=Math.atan2(cy-by,cx-bx);let d=(a2-a1)*180/Math.PI;while(d<0)d+=360;if(d>180)d=360-d;return rn(d)}
function draw(){
  const W=500,H=420;ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.strokeStyle=CIRC;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,3,0,Math.PI*2);ctx.fillStyle=CIRC;ctx.fill();
  const p=pts.map(pt=>onC(pt.a));
  let info='',rule=NAMES[theorem];
  if(theorem===0){
    const[A,B,C]=p;line(A[0],A[1],B[0],B[1],COL);line(B[0],B[1],C[0],C[1],COL);
    line(A[0],A[1],CX,CY,COL2);line(C[0],C[1],CX,CY,COL2);
    const angCirc=angle3(A[0],A[1],B[0],B[1],C[0],C[1]);
    const angCent=angle3(A[0],A[1],CX,CY,C[0],C[1]);
    drawPt(A[0],A[1],COL,'A');drawPt(B[0],B[1],COL,'B');drawPt(C[0],C[1],COL,'C');drawPt(CX,CY,COL2,'O');
    info='Angle ABC (circumference) = '+angCirc+'°<br>Angle AOC (centre) = '+angCent+'°';
  } else if(theorem===1){
    const[A,B,C]=p;line(A[0],A[1],CX,CY,CIRC,1);line(B[0],B[1],CX,CY,CIRC,1);
    line(A[0],A[1],C[0],C[1],COL);line(B[0],B[1],C[0],C[1],COL);line(A[0],A[1],B[0],B[1],COL2);
    const angC=angle3(A[0],A[1],C[0],C[1],B[0],B[1]);
    drawPt(A[0],A[1],COL2,'A');drawPt(B[0],B[1],COL2,'B');drawPt(C[0],C[1],COL,'C');
    info='AB is a diameter<br>Angle ACB = '+angC+'°';
  } else if(theorem===2){
    const[A,B,C,D]=p;
    line(A[0],A[1],C[0],C[1],COL);line(B[0],B[1],C[0],C[1],COL);
    line(A[0],A[1],D[0],D[1],COL2);line(B[0],B[1],D[0],D[1],COL2);
    const ang1=angle3(A[0],A[1],C[0],C[1],B[0],B[1]);
    const ang2=angle3(A[0],A[1],D[0],D[1],B[0],B[1]);
    drawPt(A[0],A[1],COL3,'A');drawPt(B[0],B[1],COL3,'B');drawPt(C[0],C[1],COL,'C');drawPt(D[0],D[1],COL2,'D');
    info='Angle ACB = '+ang1+'°<br>Angle ADB = '+ang2+'°';
  } else if(theorem===3){
    const[A,B,C,D]=p;
    line(A[0],A[1],B[0],B[1],COL);line(B[0],B[1],C[0],C[1],COL);line(C[0],C[1],D[0],D[1],COL);line(D[0],D[1],A[0],A[1],COL);
    const angA=angle3(D[0],D[1],A[0],A[1],B[0],B[1]);
    const angC=angle3(B[0],B[1],C[0],C[1],D[0],D[1]);
    const angB=angle3(A[0],A[1],B[0],B[1],C[0],C[1]);
    const angD=angle3(C[0],C[1],D[0],D[1],A[0],A[1]);
    drawPt(A[0],A[1],COL,'A');drawPt(B[0],B[1],COL,'B');drawPt(C[0],C[1],COL,'C');drawPt(D[0],D[1],COL,'D');
    info='Angle A = '+angA+'° | Angle C = '+angC+'° | Sum = '+rn(angA+angC)+'°<br>Angle B = '+angB+'° | Angle D = '+angD+'° | Sum = '+rn(angB+angD)+'°';
  } else {
    const[P]=p;const tx=P[0]-CX,ty=P[1]-CY;
    line(CX,CY,P[0],P[1],COL2);
    const tanX=-ty,tanY=tx,len=80;
    line(P[0]-tanX/R*len,P[1]-tanY/R*len,P[0]+tanX/R*len,P[1]+tanY/R*len,COL3,2);
    const sq=8,dx=tanX/R,dy=tanY/R,rx=(CX-P[0])/R,ry=(CY-P[1])/R;
    ctx.beginPath();ctx.moveTo(P[0]+dx*sq,P[1]+dy*sq);ctx.lineTo(P[0]+dx*sq+rx*sq,P[1]+dy*sq+ry*sq);ctx.lineTo(P[0]+rx*sq,P[1]+ry*sq);ctx.strokeStyle=CIRC;ctx.lineWidth=1;ctx.stroke();
    drawPt(P[0],P[1],COL,'P');drawPt(CX,CY,COL2,'O');
    info='Radius OP meets tangent at P<br>Angle = 90°';
  }
  document.getElementById('info').innerHTML='<div class="step-math">'+info+'</div>';
  document.getElementById('rule').textContent=rule;document.getElementById('rule').className='result-box ok';
}
cv.addEventListener('pointerdown',e=>{const rect=cv.getBoundingClientRect();const sx=500/rect.width;const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*(420/rect.height);
  pts.forEach((pt,i)=>{const p=onC(pt.a);if(Math.hypot(p[0]-mx,p[1]-my)<20)drag=i});if(drag>=0)cv.setPointerCapture(e.pointerId)});
cv.addEventListener('pointermove',e=>{if(drag<0)return;const rect=cv.getBoundingClientRect();const sx=500/rect.width;const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*(420/rect.height);
  let a=Math.atan2(my-CY,mx-CX);
  if(theorem===1&&drag<2){a=drag===0?Math.PI:0}
  pts[drag].a=a;draw()});
cv.addEventListener('pointerup',()=>{drag=-1});
initPts();draw();
</script></div></div></body></html>
