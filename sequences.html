<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sequences & nth term — VisualMaths</title><style>
@import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');

:root {
  --brand: #4338ca;
  --brand-light: #e8e6fc;
  --brand-dark: #312e81;
  --teal: #0f766e;
  --teal-light: #d5f5f0;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --coral: #c2410c;
  --coral-light: #fff1e6;
  --pink: #be185d;
  --pink-light: #fce7f3;
  --green: #15803d;
  --green-light: #dcfce7;
  --surface: #fafaf9;
  --card: #ffffff;
  --text: #1c1917;
  --text-secondary: #78716c;
  --text-tertiary: #a8a29e;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --brand: #818cf8;
    --brand-light: #1e1b4b;
    --brand-dark: #c7d2fe;
    --teal: #5eead4;
    --teal-light: #042f2e;
    --amber: #fbbf24;
    --amber-light: #422006;
    --coral: #fb923c;
    --coral-light: #431407;
    --pink: #f472b6;
    --pink-light: #500724;
    --green: #4ade80;
    --green-light: #052e16;
    --surface: #0c0a09;
    --card: #1c1917;
    --text: #fafaf9;
    --text-secondary: #a8a29e;
    --text-tertiary: #78716c;
    --border: #292524;
    --border-strong: #44403c;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.site-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-home {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  font-weight: 600;
  font-size: 15px;
}
.nav-home svg { width: 20px; height: 20px; }
.nav-sep { color: var(--text-tertiary); font-size: 14px; }
.nav-title { font-size: 15px; color: var(--text-secondary); font-weight: 500; }

/* TOOL PAGE LAYOUT */
.tool-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.tool-header {
  margin-bottom: 24px;
}
.tool-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.tool-header p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.tool-body {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

/* COMMON WIDGET STYLES */
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 6px; }
.num-input {
  width: 56px; font-size: 17px; font-weight: 600; text-align: center; padding: 6px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text);
}
.num-input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
.sym { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
select {
  font-size: 14px; padding: 6px 10px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text);
}
button {
  font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text); cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--surface); }
button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
button.primary:hover { opacity: 0.9; }

.step-card {
  background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; margin: 8px 0;
}
.step-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.step-math { font-size: 16px; font-weight: 600; }
.result-box {
  text-align: center; font-size: 20px; font-weight: 700; padding: 14px;
  background: var(--surface); border-radius: var(--radius-sm); margin: 12px 0;
}
.result-box.ok { color: var(--green); background: var(--green-light); }
.hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.bar-outer {
  height: 38px; border-radius: 6px; overflow: hidden; display: flex;
  border: 1px solid var(--border-strong);
}
.bar-seg { height: 100%; border-right: 1px solid rgba(0,0,0,0.08); }
.bar-seg:last-child { border-right: none; }

.mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-btn { font-size: 13px; padding: 6px 14px; }
.mode-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }

/* WEIGHT BLOCKS (seesaw) */
.wb {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 32px; padding: 0 8px; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: grab; touch-action: none;
}
.wb:active { cursor: grabbing; }
.w1 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
.w2 { background: var(--brand-light); color: var(--brand-dark); border: 1px solid #a5b4fc; }
.w5 { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
.w10 { background: var(--coral-light); color: var(--coral); border: 1px solid #fdba74; }
.wx { background: var(--pink-light); color: var(--pink); border: 1px solid #f9a8d4; font-style: italic; }
.wn { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

/* GRID TABLE */
.g-table { border-collapse: collapse; }
.g-table td, .g-table th { padding: 10px 16px; text-align: center; font-size: 15px; }
.g-table th { font-weight: 600; color: var(--text-secondary); }

/* CANVAS / SVG */
canvas, svg { display: block; }

/* HOMEPAGE */
.home-hero {
  text-align: center;
  padding: 48px 20px 36px;
}
.home-hero h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.home-hero p {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.topic-card:hover {
  border-color: var(--brand);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.card-tag {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; background: var(--surface); color: var(--text-tertiary);
  align-self: flex-start; margin-top: auto;
}

.section-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-tertiary); padding: 0 20px; max-width: 960px; margin: 24px auto 8px;
}

</style></head><body><nav class="site-nav"><a href="index.html" class="nav-home"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10l7-7 7 7M5 8.5V16h4v-4h2v4h4V8.5"/></svg> VisualMaths</a><span class="nav-sep">/</span><span class="nav-title">Sequences & nth term</span></nav><div class="tool-page"><div class="tool-header"><h1>Sequences & nth term</h1><p>Explore arithmetic and quadratic sequences. See the pattern as dots, find the common difference, and derive the nth term formula.</p></div><div class="tool-body"><div class="mode-row"><button class="mode-btn active" data-m="a" onclick="setM('a')">Arithmetic</button><button class="mode-btn" data-m="q" onclick="setM('q')">Quadratic</button></div>
<div id="ap"><div class="row" style="margin-bottom:10px"><span style="font-size:14px;color:var(--text-secondary)">First term:</span><input class="num-input" id="aa" type="number" value="3" oninput="gen()"><span style="font-size:14px;color:var(--text-secondary);margin-left:8px">Common difference:</span><input class="num-input" id="ad" type="number" value="5" oninput="gen()"></div></div>
<div id="qp" style="display:none"><div class="row" style="margin-bottom:10px"><span style="font-size:14px;color:var(--text-secondary)">an² + bn + c:</span><input class="num-input" id="qa" type="number" value="1" style="width:42px" oninput="gen()"><span style="font-size:14px;color:var(--text-secondary)">n² +</span><input class="num-input" id="qb" type="number" value="0" style="width:42px" oninput="gen()"><span style="font-size:14px;color:var(--text-secondary)">n +</span><input class="num-input" id="qc" type="number" value="1" style="width:42px" oninput="gen()"></div></div>
<canvas id="cv" width="600" height="200" style="width:100%;margin:8px 0"></canvas>
<div id="seq" style="font-size:16px;font-weight:600;text-align:center;margin:8px 0"></div>
<div id="diffs"></div>
<div id="formula" class="result-box"></div>
<div class="row" style="margin-top:8px"><span style="font-size:14px;color:var(--text-secondary)">Find term n =</span><input class="num-input" id="nFind" type="number" value="10" min="1" oninput="gen()"><span id="nRes" style="font-size:16px;font-weight:600;margin-left:6px"></span></div>
<script>
let mode='a';const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
const DOT=dark?'#818cf8':'#4338ca',DOTBG=dark?'#1c1917':'#fff',TXT=dark?'#fafaf9':'#1c1917',TXTM=dark?'#a8a29e':'#78716c',GRID=dark?'#292524':'#f1f0ea';
function setM(m){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));document.getElementById('ap').style.display=m==='a'?'':'none';document.getElementById('qp').style.display=m==='q'?'':'none';gen()}
function gen(){
  const terms=[];
  if(mode==='a'){const a=parseFloat(document.getElementById('aa').value)||0,d=parseFloat(document.getElementById('ad').value)||0;for(let i=1;i<=8;i++)terms.push(a+(i-1)*d)}
  else{const a=parseFloat(document.getElementById('qa').value)||0,b=parseFloat(document.getElementById('qb').value)||0,c=parseFloat(document.getElementById('qc').value)||0;for(let i=1;i<=8;i++)terms.push(a*i*i+b*i+c)}
  document.getElementById('seq').textContent=terms.map(t=>Math.round(t*100)/100).join(', ')+', ...';
  const W=600,H=200;ctx.clearRect(0,0,W,H);
  const mx=Math.max(...terms.map(Math.abs),1),pad=30;
  ctx.strokeStyle=GRID;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  terms.forEach((t,i)=>{const x=pad+(i/(terms.length-1||1))*(W-2*pad),yNorm=t/mx,y=H-pad-yNorm*(H-2*pad);
    ctx.fillStyle=DOT;ctx.beginPath();ctx.arc(x,y,Math.min(8,Math.max(4,Math.abs(t)/mx*8+3)),0,Math.PI*2);ctx.fill();
    ctx.fillStyle=TXT;ctx.font='11px var(--font)';ctx.textAlign='center';ctx.fillText(Math.round(t*100)/100,x,y-12);
    ctx.fillStyle=TXTM;ctx.fillText('n='+(i+1),x,H-pad+14)});
  let dh='<div class="step-card"><div class="step-label">First differences</div><div class="step-math">';
  const d1=[];for(let i=1;i<terms.length;i++){d1.push(Math.round((terms[i]-terms[i-1])*100)/100)}
  dh+=d1.join(', ')+'</div></div>';
  if(mode==='q'){const d2=[];for(let i=1;i<d1.length;i++)d2.push(Math.round((d1[i]-d1[i-1])*100)/100);dh+='<div class="step-card"><div class="step-label">Second differences</div><div class="step-math">'+d2.join(', ')+'</div></div>'}
  document.getElementById('diffs').innerHTML=dh;
  if(mode==='a'){const a=parseFloat(document.getElementById('aa').value)||0,d=parseFloat(document.getElementById('ad').value)||0;
    const ds=d>=0?'+ '+d:'- '+Math.abs(d);document.getElementById('formula').textContent='nth term = '+d+'n '+(a-d>=0?'+ '+(a-d):'- '+Math.abs(a-d));document.getElementById('formula').className='result-box ok'}
  else{const a=parseFloat(document.getElementById('qa').value)||0,b=parseFloat(document.getElementById('qb').value)||0,c=parseFloat(document.getElementById('qc').value)||0;
    document.getElementById('formula').textContent='nth term = '+a+'n² '+(b>=0?'+ '+b:'- '+Math.abs(b))+'n '+(c>=0?'+ '+c:'- '+Math.abs(c));document.getElementById('formula').className='result-box ok'}
  const nf=parseInt(document.getElementById('nFind').value)||1;
  let val;if(mode==='a'){const a=parseFloat(document.getElementById('aa').value)||0,d=parseFloat(document.getElementById('ad').value)||0;val=a+(nf-1)*d}
  else{const a=parseFloat(document.getElementById('qa').value)||0,b=parseFloat(document.getElementById('qb').value)||0,c=parseFloat(document.getElementById('qc').value)||0;val=a*nf*nf+b*nf+c}
  document.getElementById('nRes').textContent='→ '+Math.round(val*100)/100;
}
gen();
</script></div></div></body></html>
