<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Expanding brackets — VisualMaths</title>
<style>@import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');

:root {
  --brand: #4338ca;
  --brand-light: #e8e6fc;
  --brand-dark: #312e81;
  --teal: #0f766e;
  --teal-light: #d5f5f0;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --coral: #c2410c;
  --coral-light: #fff1e6;
  --pink: #be185d;
  --pink-light: #fce7f3;
  --green: #15803d;
  --green-light: #dcfce7;
  --surface: #fafaf9;
  --card: #ffffff;
  --text: #1c1917;
  --text-secondary: #78716c;
  --text-tertiary: #a8a29e;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --brand: #818cf8;
    --brand-light: #1e1b4b;
    --brand-dark: #c7d2fe;
    --teal: #5eead4;
    --teal-light: #042f2e;
    --amber: #fbbf24;
    --amber-light: #422006;
    --coral: #fb923c;
    --coral-light: #431407;
    --pink: #f472b6;
    --pink-light: #500724;
    --green: #4ade80;
    --green-light: #052e16;
    --surface: #0c0a09;
    --card: #1c1917;
    --text: #fafaf9;
    --text-secondary: #a8a29e;
    --text-tertiary: #78716c;
    --border: #292524;
    --border-strong: #44403c;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.site-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-home {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  font-weight: 600;
  font-size: 15px;
}
.nav-home svg { width: 20px; height: 20px; }
.nav-sep { color: var(--text-tertiary); font-size: 14px; }
.nav-title { font-size: 15px; color: var(--text-secondary); font-weight: 500; }

/* TOOL PAGE LAYOUT */
.tool-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.tool-header {
  margin-bottom: 24px;
}
.tool-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.tool-header p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.tool-body {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

/* COMMON WIDGET STYLES */
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 6px; }
.num-input {
  width: 56px; font-size: 17px; font-weight: 600; text-align: center; padding: 6px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text);
}
.num-input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
.sym { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
select {
  font-size: 14px; padding: 6px 10px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text);
}
button {
  font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text); cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--surface); }
button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
button.primary:hover { opacity: 0.9; }

.step-card {
  background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; margin: 8px 0;
}
.step-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.step-math { font-size: 16px; font-weight: 600; }
.result-box {
  text-align: center; font-size: 20px; font-weight: 700; padding: 14px;
  background: var(--surface); border-radius: var(--radius-sm); margin: 12px 0;
}
.result-box.ok { color: var(--green); background: var(--green-light); }
.hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.bar-outer {
  height: 38px; border-radius: 6px; overflow: hidden; display: flex;
  border: 1px solid var(--border-strong);
}
.bar-seg { height: 100%; border-right: 1px solid rgba(0,0,0,0.08); }
.bar-seg:last-child { border-right: none; }

.mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-btn { font-size: 13px; padding: 6px 14px; }
.mode-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }

/* WEIGHT BLOCKS (seesaw) */
.wb {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 32px; padding: 0 8px; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: grab; touch-action: none;
}
.wb:active { cursor: grabbing; }
.w1 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
.w2 { background: var(--brand-light); color: var(--brand-dark); border: 1px solid #a5b4fc; }
.w5 { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
.w10 { background: var(--coral-light); color: var(--coral); border: 1px solid #fdba74; }
.wx { background: var(--pink-light); color: var(--pink); border: 1px solid #f9a8d4; font-style: italic; }
.wn { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

/* GRID TABLE */
.g-table { border-collapse: collapse; }
.g-table td, .g-table th { padding: 10px 16px; text-align: center; font-size: 15px; }
.g-table th { font-weight: 600; color: var(--text-secondary); }

/* CANVAS / SVG */
canvas, svg { display: block; }

/* HOMEPAGE */
.home-hero {
  text-align: center;
  padding: 48px 20px 36px;
}
.home-hero h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.home-hero p {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.topic-card:hover {
  border-color: var(--brand);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.card-tag {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; background: var(--surface); color: var(--text-tertiary);
  align-self: flex-start; margin-top: auto;
}

.section-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-tertiary); padding: 0 20px; max-width: 960px; margin: 24px auto 8px;
}
</style>
<style>
.eq-big{font-size:24px;font-weight:700;text-align:center;margin:8px 0;padding:14px;border-radius:var(--radius);letter-spacing:.5px;transition:background .3s}
.eq-big.ok{background:var(--green-light);color:var(--green)}
.eq-big.wk{background:var(--surface);color:var(--text)}
.gbtn{font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-sm);cursor:pointer;transition:transform .1s}
.gbtn:active{transform:scale(.97)}
.gbtn.gp{background:var(--brand);color:#fff;border-color:var(--brand)}
.grow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.ppill{font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer;font-weight:600}
.ppill.ac{background:var(--brand-light);color:var(--brand);border-color:var(--brand)}
.grid-box{margin:16px auto;max-width:420px}
.gtable{border-collapse:separate;border-spacing:4px;width:100%}
.gtable th{font-size:16px;font-weight:700;padding:10px 16px;text-align:center;color:var(--text-secondary)}
.gcell{padding:14px 16px;text-align:center;font-size:18px;font-weight:700;border-radius:var(--radius-sm);transition:transform .3s,box-shadow .3s}
.gcell.hi{transform:scale(1.08);box-shadow:0 0 0 3px var(--brand)}
.c0{background:var(--brand-light);color:var(--brand-dark)}
.c1{background:var(--teal-light);color:var(--teal)}
.c2{background:var(--amber-light);color:var(--amber)}
.c3{background:var(--coral-light);color:var(--coral)}
.foil-step{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin:4px 0;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.foil-step:hover{background:var(--surface)}
.foil-step.active{background:var(--brand-light);color:var(--brand)}
.foil-label{width:70px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary)}
.foil-math{flex:1;font-size:16px}
.collect-box{background:var(--surface);border-radius:var(--radius);padding:14px 16px;margin:10px 0;border-left:4px solid var(--teal)}
.collect-title{font-size:12px;font-weight:600;color:var(--teal);margin-bottom:6px}
.collect-math{font-size:18px;font-weight:700}
</style>
</head><body>
<nav class="site-nav"><a href="index.html" class="nav-home"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10l7-7 7 7M5 8.5V16h4v-4h2v4h4V8.5"/></svg> VisualMaths</a><span class="nav-sep">/</span><span class="nav-title">Expanding brackets</span></nav>
<div class="tool-page"><div class="tool-header"><h1>Expanding brackets</h1><p>Use the grid to multiply each pair of terms. Hover over a step to highlight the matching cell in the grid.</p></div>
<div class="tool-body">
<div class="mode-row" style="margin-bottom:10px"><button class="mode-btn active" data-m="s" onclick="setM('s')">Single bracket</button><button class="mode-btn" data-m="d" onclick="setM('d')">Double bracket</button></div>
<div class="grow" id="pre"></div>
<div id="inputS">
<div class="row" style="margin-bottom:12px;font-size:18px;justify-content:center;gap:6px">
<input class="num-input" id="sk" type="number" value="3" style="width:50px;font-size:18px" oninput="calc()"><span class="sym" style="font-size:24px">(</span>
<input class="num-input" id="sa" type="number" value="2" style="width:50px;font-size:18px" oninput="calc()"><span style="font-style:italic;font-size:20px;font-weight:600">x</span><span class="sym">+</span>
<input class="num-input" id="sb" type="number" value="5" style="width:50px;font-size:18px" oninput="calc()"><span class="sym" style="font-size:24px">)</span></div></div>
<div id="inputD" style="display:none">
<div class="row" style="margin-bottom:12px;font-size:18px;justify-content:center;gap:6px">
<span class="sym" style="font-size:24px">(</span>
<input class="num-input" id="da" type="number" value="1" style="width:50px;font-size:18px" oninput="calc()"><span style="font-style:italic;font-size:20px;font-weight:600">x</span><span class="sym">+</span>
<input class="num-input" id="db" type="number" value="3" style="width:50px;font-size:18px" oninput="calc()"><span class="sym" style="font-size:24px">)(</span>
<input class="num-input" id="dc" type="number" value="1" style="width:50px;font-size:18px" oninput="calc()"><span style="font-style:italic;font-size:20px;font-weight:600">x</span><span class="sym">+</span>
<input class="num-input" id="dd" type="number" value="4" style="width:50px;font-size:18px" oninput="calc()"><span class="sym" style="font-size:24px">)</span></div></div>
<div class="grid-box" id="grid"></div>
<div id="foilSteps"></div>
<div id="collectBox"></div>
<div class="eq-big ok" id="result"></div>
<script>
let mode='s',hiCell=-1;
const PRS=[{l:'3(2x + 5)',k:3,a:2,b:5},{l:'4(x − 3)',k:4,a:1,b:-3},{l:'5(3x + 1)',k:5,a:3,b:1},{l:'-2(x + 4)',k:-2,a:1,b:4}];
const PRD=[{l:'(x+3)(x+4)',a:1,b:3,c:1,d:4},{l:'(x+5)(x−2)',a:1,b:5,c:1,d:-2},{l:'(2x+1)(x+3)',a:2,b:1,c:1,d:3},{l:'(x−4)(x−1)',a:1,b:-4,c:1,d:-1}];
function initP(){
  const pr=mode==='s'?PRS:PRD;
  document.getElementById('pre').innerHTML=pr.map((p,i)=>'<button class="ppill'+(i===0?' ac':'')+'" onclick="ldP('+i+')">'+p.l+'</button>').join('')}
function ldP(i){
  document.querySelectorAll('.ppill').forEach((b,j)=>b.classList.toggle('ac',j===i));
  if(mode==='s'){const p=PRS[i];document.getElementById('sk').value=p.k;document.getElementById('sa').value=p.a;document.getElementById('sb').value=p.b}
  else{const p=PRD[i];document.getElementById('da').value=p.a;document.getElementById('db').value=p.b;document.getElementById('dc').value=p.c;document.getElementById('dd').value=p.d}
  calc()}
function setM(m){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));document.getElementById('inputS').style.display=m==='s'?'':'none';document.getElementById('inputD').style.display=m==='d'?'':'none';initP();ldP(0)}
function tS(c,v,fs){if(c===0)return'';let s='';if(fs&&c>0)s='+ ';if(fs&&c<0)s='\u2212 ';else if(!fs&&c<0)s='\u2212';const a=Math.abs(c);if(!v)return s+a;if(a===1)return s+v;return s+a+v}
function pS(cs){let p=[];['x\u00B2','x',''].forEach((v,i)=>{if(cs[i]!==0)p.push(tS(cs[i],v,p.length>0))});return p.join(' ')||'0'}
function calc(){
  hiCell=-1;
  const gE=document.getElementById('grid'),fE=document.getElementById('foilSteps'),cE=document.getElementById('collectBox'),rE=document.getElementById('result');
  const CC=['c0','c1','c2','c3'];
  if(mode==='s'){
    const k=parseFloat(document.getElementById('sk').value)||0,a=parseFloat(document.getElementById('sa').value)||0,b=parseFloat(document.getElementById('sb').value)||0;
    const p1=k*a,p2=k*b;const bs=b>=0?'+ '+b:'\u2212 '+Math.abs(b);
    gE.innerHTML='<table class="gtable"><tr><th></th><th>'+tS(a,'x',false)+'</th><th>'+bs+'</th></tr><tr><th>'+k+'</th><td class="gcell c0" id="gc0" onmouseenter="hiC(0)" onmouseleave="unC()">'+tS(p1,'x',false)+'</td><td class="gcell c1" id="gc1" onmouseenter="hiC(1)" onmouseleave="unC()">'+p2+'</td></tr></table>';
    fE.innerHTML='<div class="foil-step" onmouseenter="hiC(0)" onmouseleave="unC()"><div class="foil-label">Step 1</div><div class="foil-math">'+k+' \u00D7 '+tS(a,'x',false)+' = <strong>'+tS(p1,'x',false)+'</strong></div></div><div class="foil-step" onmouseenter="hiC(1)" onmouseleave="unC()"><div class="foil-label">Step 2</div><div class="foil-math">'+k+' \u00D7 '+(b>=0?b:'('+b+')')+' = <strong>'+p2+'</strong></div></div>';
    cE.innerHTML='';
    rE.textContent=pS([0,p1,p2]);
  } else {
    const a=parseFloat(document.getElementById('da').value)||0,b=parseFloat(document.getElementById('db').value)||0,c=parseFloat(document.getElementById('dc').value)||0,d=parseFloat(document.getElementById('dd').value)||0;
    const ac=a*c,ad=a*d,bc=b*c,bd=b*d,mid=ad+bc;
    const bs=b>=0?'+ '+b:'\u2212 '+Math.abs(b),ds=d>=0?'+ '+d:'\u2212 '+Math.abs(d);
    gE.innerHTML='<table class="gtable"><tr><th></th><th>'+tS(c,'x',false)+'</th><th>'+ds+'</th></tr><tr><th>'+tS(a,'x',false)+'</th><td class="gcell c0" id="gc0" onmouseenter="hiC(0)" onmouseleave="unC()">'+tS(ac,'x\u00B2',false)+'</td><td class="gcell c1" id="gc1" onmouseenter="hiC(1)" onmouseleave="unC()">'+tS(ad,'x',false)+'</td></tr><tr><th>'+bs+'</th><td class="gcell c2" id="gc2" onmouseenter="hiC(2)" onmouseleave="unC()">'+tS(bc,'x',false)+'</td><td class="gcell c3" id="gc3" onmouseenter="hiC(3)" onmouseleave="unC()">'+bd+'</td></tr></table>';
    const FOIL=['First','Outer','Inner','Last'];
    const vals=[{l:tS(a,'x',false)+' \u00D7 '+tS(c,'x',false),r:tS(ac,'x\u00B2',false)},{l:tS(a,'x',false)+' \u00D7 '+(d>=0?d:'('+d+')'),r:tS(ad,'x',false)},{l:(b>=0?b:'('+b+')')+' \u00D7 '+tS(c,'x',false),r:tS(bc,'x',false)},{l:(b>=0?b:'('+b+')')+' \u00D7 '+(d>=0?d:'('+d+')'),r:''+bd}];
    fE.innerHTML=vals.map((v,i)=>'<div class="foil-step" onmouseenter="hiC('+i+')" onmouseleave="unC()"><div class="foil-label" style="color:var(--'+(i<2?'brand':'teal')+')">'+FOIL[i]+'</div><div class="foil-math">'+v.l+' = <strong>'+v.r+'</strong></div></div>').join('');
    cE.innerHTML='<div class="collect-box"><div class="collect-title">Collect like terms (the x terms)</div><div class="collect-math">'+tS(ad,'x',false)+' '+(bc>=0?'+ ':'\u2212 ')+tS(Math.abs(bc),'x',false)+' = '+tS(mid,'x',false)+'</div></div>';
    rE.textContent=pS([ac,mid,bd]);
  }
}
function hiC(i){
  for(let j=0;j<4;j++){const el=document.getElementById('gc'+j);if(el)el.classList.toggle('hi',j===i)}
  document.querySelectorAll('.foil-step').forEach((el,j)=>el.classList.toggle('active',j===i))}
function unC(){
  for(let j=0;j<4;j++){const el=document.getElementById('gc'+j);if(el)el.classList.remove('hi')}
  document.querySelectorAll('.foil-step').forEach(el=>el.classList.remove('active'))}
initP();calc();
</script>
</div></div></body></html>
