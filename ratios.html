<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ratio explorer — VisualMaths</title><style>
@import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');

:root {
  --brand: #4338ca;
  --brand-light: #e8e6fc;
  --brand-dark: #312e81;
  --teal: #0f766e;
  --teal-light: #d5f5f0;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --coral: #c2410c;
  --coral-light: #fff1e6;
  --pink: #be185d;
  --pink-light: #fce7f3;
  --green: #15803d;
  --green-light: #dcfce7;
  --surface: #fafaf9;
  --card: #ffffff;
  --text: #1c1917;
  --text-secondary: #78716c;
  --text-tertiary: #a8a29e;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --brand: #818cf8;
    --brand-light: #1e1b4b;
    --brand-dark: #c7d2fe;
    --teal: #5eead4;
    --teal-light: #042f2e;
    --amber: #fbbf24;
    --amber-light: #422006;
    --coral: #fb923c;
    --coral-light: #431407;
    --pink: #f472b6;
    --pink-light: #500724;
    --green: #4ade80;
    --green-light: #052e16;
    --surface: #0c0a09;
    --card: #1c1917;
    --text: #fafaf9;
    --text-secondary: #a8a29e;
    --text-tertiary: #78716c;
    --border: #292524;
    --border-strong: #44403c;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.site-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-home {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  font-weight: 600;
  font-size: 15px;
}
.nav-home svg { width: 20px; height: 20px; }
.nav-sep { color: var(--text-tertiary); font-size: 14px; }
.nav-title { font-size: 15px; color: var(--text-secondary); font-weight: 500; }

/* TOOL PAGE LAYOUT */
.tool-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.tool-header {
  margin-bottom: 24px;
}
.tool-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.tool-header p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.tool-body {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

/* COMMON WIDGET STYLES */
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 6px; }
.num-input {
  width: 56px; font-size: 17px; font-weight: 600; text-align: center; padding: 6px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text);
}
.num-input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
.sym { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
select {
  font-size: 14px; padding: 6px 10px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text);
}
button {
  font-size: 13px; font-weight: 500; padding: 7px 16px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--card); color: var(--text); cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--surface); }
button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
button.primary:hover { opacity: 0.9; }

.step-card {
  background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; margin: 8px 0;
}
.step-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.step-math { font-size: 16px; font-weight: 600; }
.result-box {
  text-align: center; font-size: 20px; font-weight: 700; padding: 14px;
  background: var(--surface); border-radius: var(--radius-sm); margin: 12px 0;
}
.result-box.ok { color: var(--green); background: var(--green-light); }
.hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.bar-outer {
  height: 38px; border-radius: 6px; overflow: hidden; display: flex;
  border: 1px solid var(--border-strong);
}
.bar-seg { height: 100%; border-right: 1px solid rgba(0,0,0,0.08); }
.bar-seg:last-child { border-right: none; }

.mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-btn { font-size: 13px; padding: 6px 14px; }
.mode-btn.active { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }

/* WEIGHT BLOCKS (seesaw) */
.wb {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 32px; padding: 0 8px; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: grab; touch-action: none;
}
.wb:active { cursor: grabbing; }
.w1 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
.w2 { background: var(--brand-light); color: var(--brand-dark); border: 1px solid #a5b4fc; }
.w5 { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
.w10 { background: var(--coral-light); color: var(--coral); border: 1px solid #fdba74; }
.wx { background: var(--pink-light); color: var(--pink); border: 1px solid #f9a8d4; font-style: italic; }
.wn { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

/* GRID TABLE */
.g-table { border-collapse: collapse; }
.g-table td, .g-table th { padding: 10px 16px; text-align: center; font-size: 15px; }
.g-table th { font-weight: 600; color: var(--text-secondary); }

/* CANVAS / SVG */
canvas, svg { display: block; }

/* HOMEPAGE */
.home-hero {
  text-align: center;
  padding: 48px 20px 36px;
}
.home-hero h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.home-hero p {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.topic-card:hover {
  border-color: var(--brand);
  transform: translateY(-2px);
}
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.card-title { font-size: 15px; font-weight: 600; }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.card-tag {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; background: var(--surface); color: var(--text-tertiary);
  align-self: flex-start; margin-top: auto;
}

.section-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-tertiary); padding: 0 20px; max-width: 960px; margin: 24px auto 8px;
}

</style></head><body><nav class="site-nav"><a href="index.html" class="nav-home"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10l7-7 7 7M5 8.5V16h4v-4h2v4h4V8.5"/></svg> VisualMaths</a><span class="nav-sep">/</span><span class="nav-title">Ratio explorer</span></nav><div class="tool-page"><div class="tool-header"><h1>Ratio explorer</h1><p>Simplify ratios, find equivalents, and share amounts in a given ratio with proportional bar models.</p></div><div class="tool-body"><div class="row" style="margin-bottom:14px">
<input class="num-input" id="r1" type="number" value="3" min="1" max="50" oninput="upd()">
<span class="sym">:</span>
<input class="num-input" id="r2" type="number" value="2" min="1" max="50" oninput="upd()">
<span class="sym" id="ec" style="display:none">:</span>
<input class="num-input" id="r3" type="number" value="1" min="1" max="50" style="display:none" oninput="upd()">
<button onclick="tog3()" id="tb">+ part</button>
</div>
<div id="bar" style="margin-bottom:12px"></div>
<div id="info"></div>
<div style="font-size:14px;font-weight:600;margin:14px 0 6px">Equivalent ratios</div>
<div id="equiv" class="row" style="gap:6px;flex-wrap:wrap"></div>
<div style="font-size:14px;font-weight:600;margin:14px 0 6px">Share an amount</div>
<div class="row" style="margin-bottom:8px"><span style="font-size:14px;color:var(--text-secondary)">Total:</span><input class="num-input" id="total" type="number" value="60" style="width:90px" oninput="upd()"></div>
<div id="shares"></div><div id="sbar"></div><div id="swork" class="hint"></div>
<script>
const COL=[{bg:'#818cf8',tx:'#fff'},{bg:'#5eead4',tx:'#042f2e'},{bg:'#fbbf24',tx:'#78350f'}];
let three=false;
function tog3(){three=!three;document.getElementById('r3').style.display=three?'':'none';document.getElementById('ec').style.display=three?'':'none';document.getElementById('tb').textContent=three?'- part':'+ part';upd()}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a}
function gcdM(a){return a.reduce((x,y)=>gcd(x,y))}
function upd(){
  const p=[Math.max(1,parseInt(document.getElementById('r1').value)||1),Math.max(1,parseInt(document.getElementById('r2').value)||1)];
  if(three)p.push(Math.max(1,parseInt(document.getElementById('r3').value)||1));
  const tot=p.reduce((s,v)=>s+v,0),g=gcdM(p),simp=p.map(x=>x/g);
  let bh='<div class="bar-outer">';p.forEach((v,i)=>{const c=COL[i];bh+='<div class="bar-seg" style="width:'+(v/tot*100).toFixed(1)+'%;background:'+c.bg+';display:flex;align-items:center;justify-content:center;color:'+c.tx+';font-size:13px;font-weight:600">'+v+'</div>'});bh+='</div>';
  document.getElementById('bar').innerHTML=bh;
  let ih='<div class="row" style="gap:12px;flex-wrap:wrap"><div class="step-card" style="flex:1;min-width:100px"><div class="step-label">Simplified</div><div class="step-math">'+simp.join(' : ')+'</div></div><div class="step-card" style="flex:1;min-width:80px"><div class="step-label">Total parts</div><div class="step-math">'+tot+'</div></div>';
  p.forEach((v,i)=>{ih+='<div class="step-card" style="flex:1;min-width:100px"><div class="step-label">Part '+'ABC'[i]+' fraction</div><div class="step-math">'+v+'/'+tot+' = '+(v/tot*100).toFixed(1)+'%</div></div>'});
  ih+='</div>';document.getElementById('info').innerHTML=ih;
  let eh='';for(let m=1;m<=6;m++){const sc=simp.map(s=>s*m);const isO=sc.every((v,i)=>v===p[i]);eh+='<button style="font-size:12px;padding:3px 10px;border-radius:20px;'+(isO?'background:var(--brand-light);border-color:var(--brand)':'')+'" onclick="loadR(['+sc+'])">'+sc.join(' : ')+'</button>'}
  document.getElementById('equiv').innerHTML=eh;
  const amt=parseFloat(document.getElementById('total').value)||0;
  const pp=amt/tot;let sh='',vals=[];
  p.forEach((v,i)=>{const c=COL[i];const val=Math.round(pp*v*100)/100;vals.push(val);sh+='<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:14px"><div style="width:16px;height:16px;border-radius:3px;background:'+c.bg+'"></div>Part '+'ABC'[i]+': '+v+'/'+tot+' of '+amt+' = <strong>'+val+'</strong></div>'});
  document.getElementById('shares').innerHTML=sh;
  if(amt>0){let sb='<div class="bar-outer" style="margin-top:6px">';p.forEach((v,i)=>{const c=COL[i];sb+='<div class="bar-seg" style="width:'+(v/tot*100).toFixed(1)+'%;background:'+c.bg+';display:flex;align-items:center;justify-content:center;color:'+c.tx+';font-size:12px;font-weight:600">'+vals[i]+'</div>'});sb+='</div>';document.getElementById('sbar').innerHTML=sb;document.getElementById('swork').textContent=amt+' ÷ '+tot+' = '+Math.round(pp*100)/100+' per part'}
}
function loadR(a){document.getElementById('r1').value=a[0];document.getElementById('r2').value=a[1];if(a.length>2&&three)document.getElementById('r3').value=a[2];upd()}
upd();
</script></div></div></body></html>
